    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* -----------------------------------------------------------
        RESET & CORE VARIABLES
        ----------------------------------------------------------- */
        :root {
            --bg-color: #050508;
            --primary-glow: #9d4edd;
            --primary-dark: #3c096c;
            --accent-cyan: #00f2ff;
            --accent-purple: #7b2cbf;
            --text-main: #ffffff;
            --text-dim: #a0a0b0;
            
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(157, 77, 221, 0.3);
            --glass-highlight: rgba(0, 242, 255, 0.05);
            
            --hud-font: 'Rajdhani', sans-serif;
            --tech-font: 'Orbitron', sans-serif;
            
            --clip-tech: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            --clip-btn: polygon(15% 0, 100% 0, 100% 70%, 85% 100%, 0 100%, 0 30%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--hud-font);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* -----------------------------------------------------------
        BACKGROUND VISUALS
        ----------------------------------------------------------- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #000000 80%);
            transition: opacity 1s ease;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.25;
        }

        /* Loading Screen */
        #LoadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s ease;
        }
        .loader-ring {
            width: 80px; height: 80px; border: 4px solid var(--primary-dark);
            border-top: 4px solid var(--accent-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; box-shadow: 0 0 20px var(--primary-glow);
        }
        .loader-text { margin-top: 20px; color: var(--accent-cyan); letter-spacing: 3px; animation: pulse 0.5s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* -----------------------------------------------------------
        MAIN LAYOUT
        ----------------------------------------------------------- */
        .app-container {
            position: absolute;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; max-width: 1200px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            z-index: 10;
            padding: 20px;
            pointer-events: none; 
        }
        .app-container > * { pointer-events: auto; }

        /* -----------------------------------------------------------
        LEFT PANEL (Clock & Weather)
        ----------------------------------------------------------- */
        .left-panel {
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }

        .clock-wrapper {
            position: relative;
            width: 250px; height: 250px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            border: 2px solid var(--primary-glow);
            box-shadow: 0 0 30px rgba(157, 77, 221, 0.2), inset 0 0 20px rgba(157, 77, 221, 0.1);
            display: flex; justify-content: center; align-items: center;
        }

        .clock-face { width: 100%; height: 100%; position: relative; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; z-index: 5; }
        .hour { width: 6px; height: 70px; background: #fff; margin-left: -3px; }
        .min { width: 4px; height: 90px; background: var(--accent-cyan); margin-left: -2px; box-shadow: 0 0 8px var(--accent-cyan); }
        .sec { width: 2px; height: 100px; background: var(--primary-glow); margin-left: -1px; }
        .center-dot { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }

        .digital-overlay { position: absolute; bottom: 12px; width: 100%; text-align: center; }
        .digi-time { font-size: 2.2rem; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .digi-ampm { font-size: 0.9rem; color: var(--accent-cyan); letter-spacing: 2px; }

        .weather-widget {
            width: 100%; max-width: 300px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            clip-path: var(--clip-tech);
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        .weather-widget:hover { transform: scale(1.02); border-color: var(--accent-cyan); }
        .weather-main { flex: 1; }
        .weather-temp { font-size: 2.5rem; font-weight: 700; color: var(--accent-cyan); line-height: 1; }
        .weather-cond { font-size: 0.9rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; margin-top: 5px; }
        .weather-loc { font-size: 0.8rem; color: var(--text-main); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .weather-icon-container {
            width: 60px; height: 60px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid var(--glass-border);
        }
        .weather-icon-container svg { width: 35px; height: 35px; fill: var(--accent-cyan); }

        /* -----------------------------------------------------------
        RIGHT PANEL (Search & Greeting)
        ----------------------------------------------------------- */
        .right-panel {
            display: flex; flex-direction: column; justify-content: center; gap: 30px;
        }
        .greeting { font-size: 1.5rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .greeting span { color: var(--accent-cyan); font-weight: 700; }

        .search-container { width: 100%; position: relative; }
        .search-bar {
            width: 100%; height: 60px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid var(--glass-border);
            clip-path: var(--clip-tech);
            display: flex; align-items: center; padding: 0 20px; gap: 15px;
            transition: all 0.3s ease;
        }
        .search-bar:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: rgba(0, 0, 0, 0.9);
        }
        .search-engine-select {
            background: transparent; border: none; color: var(--accent-cyan);
            font-family: var(--hud-font); font-weight: 600; font-size: 1rem;
            cursor: pointer; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 10px; margin-right: 5px;
        }
        .search-engine-select option { background: #000; color: #fff; }
        #searchInput {
            flex: 1; background: transparent; border: none; color: #fff;
            font-family: var(--hud-font); font-size: 1.3rem; font-weight: 500;
        }
        #searchInput::placeholder { color: rgba(255,255,255,0.3); }
        
        .search-actions { display: flex; gap: 10px; }
        .action-btn {
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-dim); cursor: pointer;
            width: 40px; height: 40px; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
        }
        .action-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 8px rgba(0, 242, 255, 0.3); }
        .action-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .search-btn {
            background: var(--primary-dark); color: #fff; border: none;
            padding: 0 20px; font-family: var(--hud-font); font-weight: 700; text-transform: uppercase;
            clip-path: var(--clip-btn); cursor: pointer; height: 40px;
            transition: 0.3s;
        }
        .search-btn:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 15px var(--accent-cyan); }

        /* -----------------------------------------------------------
        BOTTOM DOCK
        ----------------------------------------------------------- */
        .dock-container {
            position: fixed;
            bottom: 30px;
            left: 15%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center; 
            align-items: flex-end;
            z-index: 20;
        }
        

        .shortcuts-dock {
            display: flex; gap: 15px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .shortcut-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; text-decoration: none; color: var(--text-dim);
            transition: transform 0.2s;
        }
        .shortcut-item:hover { transform: translateY(-8px); color: #fff; }

        .icon-box {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }
        .shortcut-item:hover .icon-box {
            background: var(--primary-dark);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
        }
        .icon-box img, .icon-box svg { width: 90px; height: 90px; object-fit: contain; }
        .shortcut-name { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.5px; }

        /* AI TRIGGER */
        .ai-trigger {
            position: fixed;
            bottom: 35px; right: 40px; z-index: 20;
            background: linear-gradient(135deg, var(--primary-dark), #000);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600; text-transform: uppercase; font-size: 0.8rem;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            animation: glowPulse 3s infinite;
        }
        @keyframes glowPulse { 0% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); } 50% { box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); } 100% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); } }

        /* -----------------------------------------------------------
        SYSTEM OVERLAY / DIRECTOR STYLES
        ----------------------------------------------------------- */
        .svg-filters { position: absolute; width: 0; height: 0; pointer-events: none; }
        
        #world-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            transition: filter 0.5s ease;
            pointer-events: none;
        }
        
        #center-anchor {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 0; height: 0; z-index: 2000;
        }

        .signal-line {
            position: absolute; width: 0px; height: 4px; background: #9d4edd;
            box-shadow: 0 0 5px #9d4edd, 0 0 15px #9d4edd;
            left: 50%; top: 50%; transform: translate(-50%, -50%); opacity: 0;
            filter: url(#electric-noise);
        }

        #window-assembly {
            position: absolute; left: 50%; top: 50%;
            width: 1100px; height: 800px;
            transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0;
        }
        .border { position: absolute; background: #9d4edd; box-shadow: 0 0 10px #9d4edd; filter: url(#electric-noise); }
        .border-top { left: 0; right: 0; height: 4px; top: 50%; }
        .border-bottom { left: 0; right: 0; height: 4px; top: 50%; }
        .border-left { top: 50%; bottom: 50%; width: 4px; left: 0; }
        .border-right { top: 50%; bottom: 50%; width: 4px; right: 0; }

        .window-panel {
            pointer-events: none !important;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 12, 18, 0.95); opacity: 0;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            border: 1px solid rgba(0, 243, 255, 0.1);
            pointer-events: auto;
        }
        .window-panel::before {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(0, 243, 255, 0.1); pointer-events: none;
        }
        .header {
            height: 50px; display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.4); font-family: var(--tech-font);
            color: #9d4edd; font-size: 20px; letter-spacing: 6px;
            text-shadow: 0 0 10px #9d4edd;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.15) 0%, rgba(0,0,0,0) 100%);
            opacity: 0; position: relative;
        }
        .content {
            flex: 1; padding: 20px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: #fff;
            overflow: hidden;
        }
        
        .profile-card {
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid var(--accent-cyan);
            padding: 25px;
            border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center;
            width: 80%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .profile-card.active { opacity: 1; transform: translateY(0); }
        
        .card-avatar img {
            width: 90px; height: 90px; border-radius: 50%;
            border: 2px solid var(--primary-glow);
            box-shadow: 0 0 15px var(--primary-glow);
            margin-bottom: 15px;
            background: #000;
        }
        .card-name {
            color: #fff; font-size: 1.4rem; font-weight: 700;
            font-family: var(--tech-font); text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-role {
            color: var(--accent-cyan); font-size: 0.9rem; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
        }
        .card-stats {
            display: flex; justify-content: space-around; width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }
        .stat-item {
            display: flex; flex-direction: column; gap: 5px;
            font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
        }
        .stat-item span {
            color: #fff; font-weight: bold; font-size: 1rem;
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        .btn-confirm {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 243, 255, 0.1); border: 1px solid #9d4edd;
            color: #9d4edd; padding: 10px 30px; font-family: var(--tech-font);
            font-size: 11px; letter-spacing: 2px; cursor: pointer; opacity: 0;
            transition: 0.3s; pointer-events: auto; text-transform: uppercase;
        }
        .btn-confirm:hover {
            background: #9d4edd; color: #000; box-shadow: 0 0 25px #9d4edd;
        }

        .activate-btn {
            position: fixed; bottom: 8%; right: 2%; transform: translateY(-50%); z-index: 2001;
            display: flex; align-items: center; gap: 10px;
            font-family: var(--tech-font); font-size: 0.8rem; font-weight: 600;
            letter-spacing: 4px; text-transform: uppercase; padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary-dark), #000);
            color: var(--accent-cyan); border: 1px solid var(--accent-cyan);
            border-radius: 12px; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: glowPulse 3s infinite;
        }
        .activate-btn:hover {
            background: #9d4edd; color: #000; box-shadow: 0 0 30px #9d4edd; letter-spacing: 6px;
        }
        .activate-btn.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -50%) scale(0.9); }

        @keyframes flicker { 0% { opacity: 0; } 10% { opacity: 0.3; } 20% { opacity: 0; } 30% { opacity: 1; box-shadow: 0 0 40px #9d4edd; } 40% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 1; } }
        @keyframes expandLine { 0% { width: 0; opacity: 1; } 100% { width: 400px; opacity: 0; } }
        @keyframes snapTop { 0% { top: 50%; } 100% { top: 0; } }
        @keyframes snapBottom { 0% { top: 50%; } 100% { top: 100%; } }
        @keyframes snapLeft { 0% { top: 50%; bottom: 50%; } 100% { top: 0; bottom: 0; } }
        @keyframes snapRight { 0% { top: 50%; bottom: 50%; } 100% { top: 0; bottom: 0; } }
        @keyframes glitchText { 0% { opacity: 0; transform: translateX(10px) skewX(-10deg); } 20% { opacity: 1; transform: translateX(-5px) skewX(10deg); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 100% { opacity: 1; transform: translateX(0) skewX(0deg); } }

        /* -----------------------------------------------------------
   TAB SYSTEM STYLES (FIXED FOR SCROLLING)
   ----------------------------------------------------------- */
.tabs-nav {
    display: flex;
    /* Changed from center to flex-start to allow smooth scrolling */
    justify-content: flex-start; 
    gap: 20px; /* Reduced gap slightly */
    margin-bottom: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
    
    /* SCROLL FIX */
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    width: 100%;
    padding-left: 10px;
    padding-right: 20px;
}

/* Custom Scrollbar for Tabs */
.tabs-nav::-webkit-scrollbar {
    height: 4px;
}
.tabs-nav::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
}
.tabs-nav::-webkit-scrollbar-thumb {
    background: var(--primary-glow);
    border-radius: 2px;
}
.tabs-nav::-webkit-scrollbar-thumb:hover {
    background: var(--accent-cyan);
}

.tab-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--tech-font);
    font-size: 0.9rem; /* Reduced size */
    letter-spacing: 1px;
    cursor: pointer;
    /* REDUCED HEIGHT: Padding changed from 10px 20px */
    padding: 6px 15px; 
    text-transform: uppercase;
    transition: 0.3s;
    position: relative;
    flex-shrink: 0; /* Prevents tabs from squishing */
}

.tab-btn:hover { color: var(--accent-cyan); text-shadow: 0 0 5px var(--accent-cyan); }

.tab-btn.active {
    color: var(--accent-cyan);
    text-shadow: 0 0 10px var(--accent-cyan);
}

/* The glowing underline for the active tab */
.tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -11px; 
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--accent-cyan);
    box-shadow: 0 0 15px var(--accent-cyan);
}

        }

        .tab-pane {

}
        .tab-pane {

    /* -----------------------------------------------------------
    FIX: ENABLE CLICKS ON TABS
    ----------------------------------------------------------- */
    .tab-btn {
        /* This overrides the parent's 'pointer-events: none' */
        pointer-events: auto !important;
        
        /* Ensure the button is visually on top of other layers */
        position: relative;
        z-index: 1000;
        cursor: pointer;
    }

    /* Also ensure the tab content container allows interaction */
    .tab-pane {
        pointer-events: auto !important;
        z-index: 999;
    }

        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }
        /* -----------------------------------------------------------
    UNIFIED TAB SYSTEM (Scrollable & Consistent)
    ----------------------------------------------------------- */

    /* 1. SCROLLABLE CONTAINER */
    .tab-content {
        flex: 1;
        width: 100%;
        position: relative;
        overflow-y: auto; /* Enables scrolling */
        padding-right: 8px; 
        padding-bottom: 30px;
    }

    /* Custom Scrollbar */
    .tab-content::-webkit-scrollbar { width: 6px; }
    .tab-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    .tab-content::-webkit-scrollbar-thumb { background: var(--primary-glow); border-radius: 3px; }

    /* 2. TAB PANES */
    .tab-pane {
        display: none;
        width: 100%;
        padding: 10px;
        animation: fadeIn 0.4s ease;
    }
    .tab-pane.active { display: flex; flex-direction: column; align-items: center; }

    /* 3. THE UNIVERSAL CARD CLASS (Applied to ALL cards) */
    /* 3. THE UNIVERSAL CARD CLASS (Applied to ALL cards) */
.universal-card {
    background: rgba(15, 15, 20, 0.6);
    /* ADDED: Visible colored border */
    border: 1px solid var(--glass-border); 
    /* ADDED: Glowing top accent */
    border-top: 2px solid var(--primary-glow);
    
    border-radius: 10px;
    padding: 25px;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(5px);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    text-decoration: none; /* For link cards */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
}

/* Tech Grid Hover Effect */
.universal-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
        linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
    background-size: 10px 10px;
    opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: 0;
}

.universal-card:hover {
    border-color: var(--accent-cyan);
    /* Change top border to cyan on hover */
    border-top-color: var(--accent-cyan);
    
    background: rgba(0, 242, 255, 0.05);
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
}
.universal-card:hover::after { opacity: 1; }

/* Typography */
.universal-card .card-name {
    font-family: var(--tech-font);
    font-weight: 700; font-size: 1.1rem;
    color: #fff; margin-bottom: 5px;
    position: relative; z-index: 1; text-transform: uppercase; letter-spacing: 1px;
    transition: color 0.3s;
}
.universal-card:hover .card-name { color: var(--accent-cyan); text-shadow: 0 0 8px var(--accent-cyan); }

.universal-card .card-role, .universal-card .card-desc {
    font-family: var(--hud-font);
    font-size: 0.85rem; color: var(--text-dim);
    position: relative; z-index: 1; line-height: 1.4;
}

    /* Specific Layout Helpers */
    .ai-grid-tools { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; width: 100%; margin-bottom: 20px;}
    .profile-card { width: 80%; max-width: 400px; margin-bottom: 20px; }
    .profile-card img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--primary-glow); margin-bottom: 15px; }
    .cat-header { width: 100%; text-align: left; margin-bottom: 10px; border-left: 3px solid var(--accent-cyan); padding-left: 10px; }
    .cat-title { display: block; color: var(--accent-cyan); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .cat-desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }





        /* -----------------------------------------------------------
        SIDE PANELS
        ----------------------------------------------------------- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 200;
        }
        .logo { font-weight: 700; color: var(--primary-glow); letter-spacing: 2px; text-transform: uppercase; font-size: 1.1rem; pointer-events: none;}
        .nav-btn {
            background: transparent; border: 1px solid var(--glass-border); color: var(--text-dim);
            padding: 8px 15px; cursor: pointer; font-family: var(--hud-font); font-weight: 600;
            transition: 0.3s; clip-path: var(--clip-tech); margin-left: 10px;
        }
        .nav-btn:hover { border-color: var(--accent-cyan); color: #fff; box-shadow: 0 0 10px var(--accent-cyan); }

        .overlay-panel {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
            background: rgba(10, 10, 15, 0.95); border-left: 2px solid var(--primary-glow);
            backdrop-filter: blur(15px); z-index: 2004; padding: 25px;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            opacity: 0;
        }
        .overlay-panel.active { right: 0; opacity: 1; }
        
        .panel-header {
            font-size: 1.4rem; color: var(--accent-cyan); text-transform: uppercase;
            border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .close-btn { cursor: pointer; font-size: 1.5rem; color: var(--text-dim); transition: 0.2s; }
        .close-btn:hover { color: #fff; }

        .todo-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .todo-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 10px; font-family: var(--hud-font); }
        .todo-add { background: var(--accent-purple); color: #fff; border: none; padding: 0 15px; cursor: pointer; font-weight: 700; }
        .todo-list { list-style: none; overflow-y: auto; flex: 1; }
        .todo-item {
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--text-dim);
            padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between;
        }
        .todo-item:hover { background: rgba(255,255,255,0.08); border-left-color: var(--accent-cyan); }
        .todo-item.completed span { text-decoration: line-through; color: var(--text-dim); opacity: 0.6; }
        .delete-task { color: #ff4444; font-weight: bold; cursor: pointer; }

        .bookmark-category { margin-bottom: 20px; }
        .cat-title { color: var(--primary-glow); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
        .bookmark-link { display: block; padding: 10px; color: var(--text-main); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .bookmark-link:hover { background: rgba(255,255,255,0.05); color: var(--accent-cyan); padding-left: 15px; }
        
       .ai-grid { 
    display: grid; 
    grid-template-columns: 1fr 1fr; /* 2 Columns */
    gap: 15px; 
    width: 100%;
}

.ai-card {
    background: rgba(255,255,255,0.03); 
    border: 1px solid var(--glass-border);
    padding: 15px; 
    text-align: center; 
    cursor: pointer; 
    border-radius: 8px;
    transition: 0.3s; 
    text-decoration: none; 
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.ai-card:hover { 
    border-color: var(--accent-cyan); 
    transform: translateY(-3px); 
    box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
    background: rgba(0, 242, 255, 0.05);
}

.ai-icon { 
    width: 40px; 
    height: 40px; 
    margin: 0 auto 10px; 
    fill: var(--accent-cyan); 
}
        .ai-card:hover { border-color: var(--accent-cyan); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .ai-icon { width: 40px; height: 40px; margin: 0 auto 10px; fill: var(--accent-cyan); }

        .backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
            z-index: 400; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .backdrop.active { opacity: 1; pointer-events: auto; }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; gap: 20px; top: 40%; }
            .left-panel { flex-direction: row; justify-content: center; width: 100%; }
            .clock-wrapper { width: 180px; height: 180px; }
            .digi-time { font-size: 1.5rem; }
            .dock-container { flex-direction: column-reverse; gap: 15px; align-items: center; bottom: 20px; width: 95%; }
            .shortcuts-dock { width: 100%; overflow-x: auto; justify-content: flex-start; padding: 10px; }
            .overlay-panel { width: 100%; max-width: 100%; right: -100%; }
            .search-bar { width: 100%; }
            .app-container { display: flex; flex-direction: column; }
            .right-panel { width: 100%; }
            .greeting { text-align: center; font-size: 1.2rem; }
        }

        /* -----------------------------------------------------------
FIX: SHOW ALL CARDS IN CATEGORY GRID
----------------------------------------------------------- */

/* 1. FORCE THE GRID TO EXPAND VERTICALLY */
.ai-grid-tools {
    /* Ensure height is determined by content, not a fixed limit */
    height: auto !important;
    max-height: none !important;

    /* Allow infinite rows */
    grid-auto-rows: auto !important;

    /* Ensure it takes full width */
    width: 100% !important;

    /* Responsive Columns: Adjust '200px' if you want more/less per row */
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) !important;
    gap: 16px !important;
}

/* 2. ENSURE CATEGORY BLOCK DOESN'T COLLAPSE */
.ai-category-block {
    /* Force full width */
    width: 100% !important;

    /* Prevent shrinking inside flex containers */
    flex-shrink: 0 !important;

    /* Add margin to separate from next category */
    margin-bottom: 40px !important;
}

/* 3. FIX CARD HEIGHT CONSISTENCY (Optional) */
.universal-card {
    /* Ensures cards don't collapse if content is short */
    min-height: 120px;
}

/* -----------------------------------------------------------
FIX: SHOW ALL CARDS & ENABLE SCROLLING
----------------------------------------------------------- */

/* 1. FIX THE MAIN CONTAINER (Director Window Content) */
.window-panel .content {
    /* Override the default 'center' alignment that cuts off top/bottom content */
    justify-content: flex-start !important;
    align-items: stretch !important;

    /* Enable vertical scrolling so all categories are accessible */
    overflow-y: auto !important;
    overflow-x: hidden !important;

    /* Ensure it uses the full height available */
    height: 100%;
    padding: 20px;
}

/* 2. ENSURE THE GRID EXPANDS FREELY */
.ai-grid-tools {
    /* Ensure rows grow to fit content */
    grid-auto-rows: min-content;
    min-height: 0;
}

/* 3. FIX SCROLLBAR APPEARANCE */
.window-panel .content::-webkit-scrollbar {
    width: 6px;
}
.window-panel .content::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
}
.window-panel .content::-webkit-scrollbar-thumb {
    background: var(--primary-glow);
    border-radius: 3px;
}
.window-panel .content::-webkit-scrollbar-thumb:hover {
    background: var(--accent-cyan);
}
/* REVERSE ANIMATIONS FOR SMOOTH CLOSING */
@keyframes snapTopReverse { 0% { top: 0; } 100% { top: 50%; } }
@keyframes snapBottomReverse { 0% { top: 100%; } 100% { top: 50%; } }
@keyframes snapLeftReverse { 0% { top: 0; bottom: 0; } 100% { top: 50%; bottom: 50%; } }
@keyframes snapRightReverse { 0% { top: 0; bottom: 0; } 100% { top: 50%; bottom: 50%; } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="LoadingScreen">
        <div class="loader-ring"></div>
        <div class="loader-text">SYSTEM INITIALIZING...</div>
    </div>

    <!-- 3D Background Container -->
    <div id="three-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -5; opacity: 0; pointer-events: none; transition: opacity 1s ease;"></div>   

    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    <div class="scanlines"></div>

    <!-- Backdrop for Modals -->
    <div class="backdrop" id="backdrop"></div>

    <!-- Top Nav -->
    <div class="top-nav">
        <div class="logo">System<span style="color:var(--accent-cyan)">.Interface</span></div>
        <div style="display:flex; gap:10px;">
            <button class="nav-btn" id="todoBtn">TASKS</button>
            <button class="nav-btn" id="bookmarkBtn">BOOKMARKS</button>
            <button class="nav-btn" id="settingsBtn">SETTINGS</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="app-container">
        <!-- Left: Clock & Weather -->
        <div class="left-panel">
            <div class="clock-wrapper">
                <div class="digital-overlay">
                    <div class="digi-time" id="digitalTime">12:00</div>
                    <div class="digi-ampm" id="ampm">AM</div>
                </div>
                <div class="clock-face">
                    <div class="hand hour" id="hourHand"></div>
                    <div class="hand min" id="minHand"></div>
                    <div class="hand sec" id="secHand"></div>
                    <div class="center-dot"></div>
                </div>
            </div>

            <div class="weather-widget" id="weatherWidget">
                <div class="weather-main">
                    <div class="weather-temp" id="tempDisplay">--°</div>
                    <div class="weather-cond" id="conditionDisplay">Detecting...</div>
                    <div class="weather-loc">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <span id="cityDisplay">Unknown City</span>
                    </div>
                </div>
                <div class="weather-icon-container">
                    <svg viewBox="0 0 64 64"><g fill="none" fill-rule="evenodd"><g fill="#00f2ff" fill-opacity="1"><path d="M39.2 48.4c-1.6 0-3.2.4-4.6 1.2-2.1-3.9-6.2-6.6-10.9-6.6-6.8 0-12.3 5.5-12.3 12.3 0 .6.1 1.3.2 1.9H40c.4-.6.7-1.3.7-2 0-3.6-2.9-6.8-6.5-6.8z"/></g></g></svg>
                </div>
            </div>
        </div>

        <!-- Right: Search -->
        <div class="right-panel">
            <div class="greeting">
                User <span id="userName">Abdul Rehman</span>, the system welcomes you.
            </div>
            <div class="search-container">
                <div class="search-bar">
                    <select id="searchEngine" class="search-engine-select">
                        <option value="google">Google</option>
                        <option value="duckduckgo">DuckDuckGo</option>
                        <option value="bing">Bing</option>
                        <option value="youtube">YouTube</option>
                        <option value="brave">Brave</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Enter command..." autocomplete="off">
                    <div class="search-actions">
                        <button class="action-btn" id="voiceBtn" title="Voice Search">
                            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        </button>
                        <button class="search-btn" id="searchBtn">Search</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Dock -->
    <div class="dock-container">
        <div class="shortcuts-dock">

        </div>
    </div>

    <!-- AI Trigger -->
    <div class="ai-trigger" id="aiTrigger">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/></svg>
        AI TOOLS
    </div>

    <!-- SIDE PANELS -->
    <div class="overlay-panel" id="todoPanel">
        <div class="panel-header">System Tasks <span class="close-btn" onclick="togglePanel('todoPanel')">&times;</span></div>
        <div class="todo-input-group">
            <input type="text" id="newTodo" class="todo-input" placeholder="New directive...">

        <ul id="todoList" class="todo-list"></ul>
    </div>

    <div class="overlay-panel" id="bookmarkPanel">

        <div id="bookmarkContainer"></div>
    </div>

    <div class="overlay-panel" id="aiPanel">
        <div class="panel-header">AI Intelligence <span class="close-btn" onclick="togglePanel('aiPanel')">&times;</span></div>
        <div class="ai-grid">
            <a href="https://chatgpt.com" target="_blank" class="ai-card">
                <svg class="ai-icon" viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V11a2 2 0 0 1-2 2H9v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2.5c0-.83.67-1.5 1.5-1.5H6v-1H4.5C3.12 10 2 8.88 2 7.5v-2C2 4.12 3.12 3 4.5 3h5.77C10.4 2.4 11.15 2 12 2m0 2c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1m-6 8h2v-2H6v2m-2 2h2v-2H4v2"/></svg>
                <div>ChatGPT</div>
            </a>
            <a href="https://gemini.google.com" target="_blank" class="ai-card">
